name: Build, Sign & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write   # Required by SignPath to verify the workflow origin
  contents: write   # Required to create GitHub releases

jobs:
  build-and-sign:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install pyinstaller pystray Pillow

      - name: Build exe (PyInstaller)
        run: >
          python -m PyInstaller
          --onefile --noconsole
          --icon=jupyter.ico
          --add-data "jupyter.ico;."
          --hidden-import pystray._win32
          --hidden-import PIL._imaging
          launch_jupyter.py

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer (Inno Setup)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\JupyterLauncher.iss'
        shell: pwsh

      # Upload the unsigned installer so SignPath can pick it up
      - name: Upload unsigned installer
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: installer/JupyterLauncher-Setup.exe

      # SignPath Foundation signs the artifact and returns the signed version
      - name: Sign installer (SignPath)
        id: sign
        uses: SignPath/github-action-submit-signing-request@v1.1
        with:
          api-token:                  ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id:            ${{ vars.SIGNPATH_ORG_ID }}
          project-slug:               jupyter-launcher
          signing-policy-slug:        release-signing
          artifact-configuration-slug: installer
          github-artifact-id:         ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion:        true
          output-artifact-directory:  signed/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Jupyter Launcher ${{ github.ref_name }}
          files: signed/JupyterLauncher-Setup.exe
          body: |
            ## Install
            Download and run **JupyterLauncher-Setup.exe**.
            This installer is digitally signed — no SmartScreen warning.

            ## Requirements
            Python must be installed. The installer will offer to run `pip install notebook` if Jupyter is not found.
